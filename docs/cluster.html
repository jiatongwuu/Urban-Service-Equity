<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Equity Dashboard — Cluster Report</title>
    <link rel="stylesheet" href="assets/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="title">Cluster report moved</div>
        <div class="subtitle">The report now lives on the map page below</div>
      </div>
      <div class="controls">
        <a class="btn" href="./index.html#report">Go to report</a>
        <a class="btn secondary" href="./index.html">Back to map</a>
      </div>
    </header>

    <main class="main reportMain">
      <section class="panel">
        <div class="panelHeader">
          <div class="panelTitle">Use the single-page flow</div>
          <div class="panelMeta">Click a map point → auto-scroll to report</div>
        </div>
        <div style="padding:12px;color:var(--muted);line-height:1.6">
          This page is kept only for compatibility. The cluster report is now part of
          <code>index.html</code> so demos feel smoother (map → scroll-down explanation).
        </div>
      </section>
    </main>
  </body>
</html>
